  <!-- Left face -->
  <polygon points="16,15 9,11.5 9,21 16,24.5" fill="#DBA26E"/>
  <!-- Small label -->
  <rect x="10.5" y="18" width="3" height="2" rx="0.3" fill="#F8EEE4" transform="skewY(-30) translate(0,11.5)"/>
</svg>
