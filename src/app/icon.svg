<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 3D Cardboard Box -->
  <!-- Top face -->
  <polygon points="16,4 28,10 16,16 4,10" fill="#D4915C"/>
  <!-- Top tape/stripe -->
  <polygon points="14,4.8 18,4.8 18,15.2 14,15.2" fill="#8B5E3C" opacity="0.6"/>
  <!-- Right face -->
  <polygon points="16,16 28,10 28,24 16,30" fill="#C17A3A"/>
  <!-- Left face -->
  <polygon points="16,16 4,10 4,24 16,30" fill="#E0A86E"/>
  <!-- Tape on right face -->
  <polygon points="16,16 16,30 18,29 18,15" fill="#8B5E3C" opacity="0.3"/>
  <!-- Small label on left face -->
  <rect x="6" y="20" width="5" height="3.5" fill="#F5E6D3" rx="0.5" transform="skewY(-26.5) translate(0, 13)"/>
</svg>
